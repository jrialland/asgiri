name: Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      run: pip install uv

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Run Bandit security scan
      run: uv run bandit -r asgiri
