name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Install uv
      run: pip install uv

    - name: Cache uv dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    # avoid installing uvloop on windows as it is not supported
    - name: Install dependencies (Windows - no uvloop)
      if: matrix.os == 'windows-latest'
      run: uv sync --group dev

    - name: Install dependencies (Unix - with all extras)
      if: matrix.os != 'windows-latest'
      run: uv sync --all-extras --group dev

    # on every platform except ubuntu with python 3.13, run normal tests (exclude slow tests)
    - name: Run tests with pytest
      if: matrix.os != 'ubuntu-latest' || matrix.python-version != '3.13'
      run: uv run pytest tests/ -m "not slow" -v --tb=short

    # on ubuntu with python 3.13, run tests with coverage and upload to coveralls
    - name: Run tests with coverage
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
      run: |
        uv run coverage run --source=asgiri -m pytest tests/ -m "not slow"
        uv run coverage report
        uv run coverage xml

    - name: Upload coverage to Coveralls
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: coverage.xml
      continue-on-error: true

  # Separate job for slow/security tests
  security-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install uv
      run: pip install uv

    - name: Cache uv dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Install dependencies
      run: uv sync --all-extras --group dev

    - name: Run security tests
      run: uv run pytest tests/ -m security -v --tb=short
      timeout-minutes: 15
    